apiVersion: v1
kind: Pod
metadata:
  name: p2p-server-0
  labels:
    app: p2p-server
    domain: blockchain
spec:
  containers:
    - name: p2p-server
      image: lebaz20/blockchain-rapidchain-p2p-server:latest
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          memory: 256Mi
          cpu: 200m
      env:
        - name: SECRET
          value: NODE0
        - name: IS_FAULTY
          value: 'true'
        - name: SHOULD_REDIRECT_FROM_FAULTY_NODES
          value: 'false'
        - name: P2P_PORT
          value: '5001'
        - name: HTTP_PORT
          value: '3001'
        - name: TRANSACTION_THRESHOLD
          value: '100'
        - name: BLOCK_THRESHOLD
          value: '3'
        - name: NUMBER_OF_NODES_PER_SHARD
          value: '4'
        - name: NUMBER_OF_NODES
          value: '24'
        - name: NODES_SUBSET
          value: '[5,0,7,9]'
        - name: SUBSET_INDEX
          value: SUBSET1
        - name: COMMITTEE_SUBSET_INDEX
          value: SUBSET_COMMITTEE
        - name: CORE
          value: ws://core-server:4999
        - name: CPU_LIMIT
          value: '0.2'
        - name: DEFAULT_TTL
          value: '6'
      ports:
        - containerPort: 3001
        - containerPort: 5001
      readinessProbe:
        httpGet:
          path: /health
          port: 3001
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
  restartPolicy: OnFailure
---
apiVersion: v1
kind: Service
metadata:
  name: p2p-server-0
  labels:
    app: p2p-server
    domain: blockchain
spec:
  clusterIP: None
  selector:
    app: p2p-server
  ports:
    - name: '5001'
      protocol: TCP
      port: 5001
      targetPort: 5001
    - name: '3001'
      protocol: TCP
      port: 3001
      targetPort: 3001
---
